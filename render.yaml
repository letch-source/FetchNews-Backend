services:
  - type: web
    name: fetchnews-backend
    env: node
    buildCommand: npm install
    startCommand: node server/index.js
    # Backend code is in the root directory, not in a backend/ subdirectory
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: MEDIASTACK_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
