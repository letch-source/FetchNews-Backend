services:
  - type: web
    name: fetchnews-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server/index.js
    # Note: Using cd commands instead of rootDir due to nested git repository issue
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: MEDIASTACK_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
